# Application name - you can keep this or change it
spring.application.name=JPADemo

# MySQL driver - keep this as is
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Database URL - format: jdbc:mysql://hostname:port/database_name
# hostname: localhost (your computer)
# port: 3306 (default MySQL port)
# database_name: employee (the database you created)
spring.datasource.url=jdbc:mysql://localhost:3306/employee

# MySQL username - usually 'root' for local development
spring.datasource.username=root

# MySQL password - the password you set during MySQL installation
spring.datasource.password=ES1902

# Show SQL queries in console - useful for debugging
spring.jpa.show-sql=true

# Auto-create/update database tables from your Java entities
spring.jpa.hibernate.ddl-auto=update

# MySQL dialect for Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect